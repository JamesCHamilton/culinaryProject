<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlavorFusion - Ingredient Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .recipe-card { transition: transform 0.2s; }
        .recipe-card:hover { transform: translateY(-5px); }
        .navbar-brand { font-weight: bold; color: #ff6b6b !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">FlavorFusion</a>
            <div class="navbar-nav ms-auto text-center">
                {% if user.is_authenticated %}
                    <a class="nav-link btn btn-outline-danger btn-sm text-light me-3 px-3" href="{% url 'add_recipe' %}">+ Add Recipe</a>
                    <span class="nav-link text-light">Welcome, {{ user.username }}</span>
                    <a class="nav-link" href="{% url 'signout' %}">Logout</a>
                {% else %}
                    <a class="nav-link" href="{% url 'signin' %}">Login</a>
                    <a class="nav-link" href="{% url 'signup' %}">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 FlavorFusion - Ingredient Finder</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
